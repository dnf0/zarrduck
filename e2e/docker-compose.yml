version: '3.8'

services:
  builder:
    build:
      context: .
      dockerfile: Dockerfile.builder
    volumes:
      - ../:/app
    environment:
      - CARGO_TARGET_DIR=/app/target_docker

  generator:
    build:
      context: .
      dockerfile: Dockerfile.generator
    volumes:
      - ./data:/data
      - ./generate_zarr.py:/app/generate_zarr.py

  duckdb:
    build:
      context: .
      dockerfile: Dockerfile.duckdb
    depends_on:
      builder:
        condition: service_completed_successfully
      generator:
        condition: service_completed_successfully
    volumes:
      - ./data:/data
      - ../:/app
