[package]
name = "geozarr-cli"
version = "0.1.0"
edition = "2021"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
duckdb = { version = "1.1.1", features = ["bundled"] }
tokio = { version = "1.0", features = ["full"] }
opendal = { version = "0.48", features = ["services-s3", "services-http", "services-fs"] }
zarrs = { version = "0.16.4", features = ["opendal", "async"] }
serde_json = "1.0"
futures = "0.3"
