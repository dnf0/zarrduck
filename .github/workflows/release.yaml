name: Semantic Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Extension
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: eider-linux-amd64.duckdb_extension
          - os: macos-latest
            artifact_name: eider-macos-arm64.duckdb_extension
          - os: windows-latest
            artifact_name: eider-windows-amd64.duckdb_extension

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-duckdb-ext
        run: cargo install cargo-duckdb-ext-tools

      - name: Patch duckdb-rs for Windows
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cargo fetch
          FILE=$(find ~/.cargo/registry -path "*/duckdb-1.10502.0/src/core/logical_type.rs" | head -n 1)
          if [ -n "$FILE" ]; then
            python scripts/patch_duckdb_rs_windows.py "$FILE"
          else
            echo "logical_type.rs not found!"
            exit 1
          fi

      - name: Build Extension
        shell: bash
        run: |
          # Build a LOADABLE extension: omit `bundled` (use the host DuckDB C API)
          # and stamp the runtime DuckDB version (the =1.10502.0 crate bundles
          # libduckdb v1.5.2). The init symbol is derived from the loaded filename,
          # so the CLI expects `eider.duckdb_extension`; install renames the
          # per-platform artifact to that locally.
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            # Regenerate loadable bindings for MSVC (the pre-generated ones mismatch
            # the Windows type layout -> E0308) via buildtime_bindgen + the vendored
            # duckdb headers; build the package alone (its lib target `eider`
            # collides with the cli bin) and package the dll, stamped v1.5.2.
            BINDGEN_EXTRA_CLANG_ARGS="-I$PWD/extension/vendor" cargo build --package eider_extension --release --no-default-features --features loadable-bindgen
            cargo duckdb-ext package --library-path target/release/eider.dll --extension-path target/release/${{ matrix.artifact_name }} --extension-version v0.1.0 --duckdb-platform windows_amd64 --duckdb-version v1.5.2
          else
            cargo duckdb-ext build -o target/release/eider.duckdb_extension -d v1.5.2 -- --release --no-default-features --features loadable-extension
          fi

      - name: Rename Artifact
        shell: bash
        run: |
          if [ "${{ matrix.os }}" != "windows-latest" ]; then
            ls -la target/release/ || true
            mv target/release/*.duckdb_extension target/release/${{ matrix.artifact_name }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/release/${{ matrix.artifact_name }}

  release:
    name: Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
    if: ${{ !contains(github.event.head_commit.message, 'skip release') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: extension_binaries
          merge-multiple: true

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 23
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
