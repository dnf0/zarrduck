name: Semantic Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Extension
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: duckdb_geozarr-linux-amd64.duckdb_extension
          - os: macos-latest
            artifact_name: duckdb_geozarr-macos-arm64.duckdb_extension
          - os: windows-latest
            artifact_name: duckdb_geozarr-windows-amd64.duckdb_extension
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-duckdb-ext
        run: cargo install cargo-duckdb-ext-tools

      - name: Build Extension
        run: cargo duckdb-ext build -- --release

      - name: Rename Artifact
        shell: bash
        run: mv target/release/duckdb_geozarr.duckdb_extension target/release/${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/release/${{ matrix.artifact_name }}

  release:
    name: Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
    if: ${{ !contains(github.event.head_commit.message, 'skip release') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: extension_binaries
          merge-multiple: true

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 23
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
