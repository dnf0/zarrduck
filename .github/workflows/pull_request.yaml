name: Pre-Commit & Unit Test

on:
  - pull_request
  - workflow_dispatch

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Classify the PR: which job families need to run. Docs-only PRs skip the
  # heavy 3-OS Rust matrix; code-only PRs skip the docs build. A file under
  # docs/ is "docs"; anything else (Rust, workflows, scripts) is "code".
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE" ]; then
            # workflow_dispatch (no PR diff context): run everything.
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "docs=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FILES=$(git diff --name-only "$BASE" HEAD)
          echo "Changed files:"; echo "$FILES"
          CODE=false
          DOCS=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              docs/*) DOCS=true ;;
              *) CODE=true ;;
            esac
          done <<< "$FILES"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "docs=$DOCS" >> "$GITHUB_OUTPUT"
          echo "Resolved -> code=$CODE docs=$DOCS"

  ci-checks:
    name: CI Checks
    needs: changes
    runs-on: ${{ matrix.os }}
    # Disable debug info: each integration-test binary statically links bundled
    # DuckDB, and the resulting .pdb files exhaust the Windows runner's disk
    # (LNK1201). Tests don't need debug symbols.
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest
    if: "needs.changes.outputs.code == 'true' && !contains(github.event.head_commit.message, '[ci-skip]')"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache DuckDB extensions
        uses: actions/cache@v4
        with:
          path: .duckdb_ext_cache
          key: ${{ runner.os }}-duckdb-ext-cache-v1

      - name: Install DuckDB CLI (for shell REPL tests)
        shell: bash
        run: |
          # Pin to the libduckdb version the duckdb crate (=1.10502.0) bundles
          # (v1.5.2). `eider shell` loads the eider extension (stamped v1.5.2)
          # into this CLI, so the versions must match exactly.
          mkdir -p "$HOME/.local/bin"
          if [ "$RUNNER_OS" = "Linux" ]; then
            curl -L https://github.com/duckdb/duckdb/releases/download/v1.5.2/duckdb_cli-linux-amd64.zip -o duckdb.zip
            unzip -o duckdb.zip -d "$HOME/.local/bin"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            curl -L https://github.com/duckdb/duckdb/releases/download/v1.5.2/duckdb_cli-osx-universal.zip -o duckdb.zip
            unzip -o duckdb.zip -d "$HOME/.local/bin"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
        continue-on-error: true

      - name: Install Python
        uses: actions/setup-python@v5

      - name: Run pre-commit
        if: matrix.os == 'ubuntu-latest'
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files

      - name: Install duckdb-ext-tools
        run: cargo install cargo-duckdb-ext-tools --force

      - name: Patch duckdb-rs for Windows
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cargo fetch
          FILE=$(find ~/.cargo/registry -path "*/duckdb-1.10502.0/src/core/logical_type.rs" | head -n 1)
          if [ -n "$FILE" ]; then
            python scripts/patch_duckdb_rs_windows.py "$FILE"
          else
            echo "logical_type.rs not found!"
            exit 1
          fi

      - name: Build extension and test
        shell: bash
        run: |
          # Build a LOADABLE extension: name it eider.duckdb_extension (the init
          # symbol is derived from the filename), stamp the runtime DuckDB version
          # (libduckdb bundled by the =1.10502.0 crate reports v1.5.2), and omit
          # `bundled` so the host DuckDB's C API is used instead of a static copy.
          if [ "$RUNNER_OS" = "Windows" ]; then
            # On Windows the pre-generated loadable bindings mismatch the MSVC type
            # layout (E0308), so regenerate them with buildtime_bindgen, pointing
            # clang at the vendored duckdb headers. The extension lib target `eider`
            # collides with the cli bin `eider`, so `cargo duckdb-ext build` can't
            # locate the cdylib — build the package alone and package the dll.
            BINDGEN_EXTRA_CLANG_ARGS="-I$PWD/extension/vendor" cargo build --package eider_extension --no-default-features --features loadable-bindgen
            cargo duckdb-ext package --library-path target/debug/eider.dll --extension-path target/debug/eider.duckdb_extension --extension-version v0.1.0 --duckdb-platform windows_amd64 --duckdb-version v1.5.2
          else
            cargo duckdb-ext build -o target/debug/eider.duckdb_extension -d v1.5.2 -- --no-default-features --features loadable-extension
          fi
          cargo test

  audit-and-coverage:
    name: Security Audit & Coverage
    needs: changes
    runs-on: ubuntu-latest
    if: "needs.changes.outputs.code == 'true' && !contains(github.event.head_commit.message, '[ci-skip]')"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-audit

      - name: Install duckdb-ext-tools
        run: cargo install cargo-duckdb-ext-tools --force

      - name: Run cargo audit
        run: cargo audit

      - name: Build extension
        run: cargo duckdb-ext build -o target/debug/eider.duckdb_extension -d v1.5.2 -- --no-default-features --features loadable-extension

      - name: Generate code coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

  # Docs-only validation: build the Docusaurus site so broken internal links
  # (onBrokenLinks: 'throw') fail the PR BEFORE merge, not at deploy time.
  # Mirrors the build step in docs.yaml; no Rust toolchain needed.
  docs-build:
    name: Docs Build
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.docs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - name: Install dependencies
        run: cd docs && npm ci
      - name: Build
        run: cd docs && npm run build
